spring.application.name=spring-demo
server.port=${PORT:8080}
server.address=0.0.0.0

logging.level.org.springframework=INFO
logging.level.com.techup=DEBUG

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# update would run ALTER TABLE; Postgres rejects changing columns used by triggers (e.g. swipes.action + trigger_check_match).
# Manage schema in Supabase/SQL; override locally with SPRING_JPA_HIBERNATE_DDL_AUTO=update if needed.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

supabase.url=${SUPABASE_URL:}
supabase.bucket=${SUPABASE_BUCKET:uploads}
# Chat attachments (Supabase Storage); must match dashboard bucket e.g. chat-images
supabase.chat-bucket=${SUPABASE_CHAT_BUCKET:chat-images}
# Signed URL lifetime for chat images (private buckets). Max typically 604800 (7d).
supabase.chat-image-sign-ttl-seconds=${SUPABASE_CHAT_IMAGE_SIGN_TTL_SECONDS:604800}
supabase.apiKey=${SUPABASE_API_KEY:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
# Decoded profile image bytes (register data URLs + multipart upload). Supabase/API often limits ~5–6 MiB.
merry.profile-photo.max-bytes=${MERRY_PROFILE_PHOTO_MAX_BYTES:5242880}
# Must match Supabase Dashboard → Project Settings → API → JWT Secret (not the anon/service key).
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}
# Optional. Typical Supabase access token audience is "authenticated"; leave empty to skip aud checks.
jwt.audience=${JWT_AUDIENCE:}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Optional: auto-create matches + chat_rooms for frontend mock room id (needs 2+ users in DB)
merry.chat.seed-dev-room=${MERRY_CHAT_SEED_DEV_ROOM:false}
merry.chat.dev-room-id=${MERRY_CHAT_DEV_ROOM_ID:00000000-0000-0000-0000-000000000001}

spring.config.import=optional:classpath:application-local.properties

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hybrid: lazy (read membership) + cron — ต่ออายุ / หมดอายุ / ย้าย downgrade ที่ถึงเวลา
scheduler.subscription.enabled=true
# every 1 hour (Spring 6-field cron: second minute hour day month weekday)
# You can override via env/props: scheduler.subscription.cron
scheduler.subscription.cron=0 0 * * * *

# Subscription billing period used to compute current_period_end (each package cycle).
# P30D = 30 calendar days per billing period.
subscription.billing.period=P30D

omise.webhook-secret=${OMISE_WEBHOOK_SECRET}